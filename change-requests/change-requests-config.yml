# Change request extension configuration

# -----------------------------------------------------------------------------
# Paths
# -----------------------------------------------------------------------------
paths:
  data_dir: ".project/change-requests"
  registry_filename: "change-request-report.md"

# -----------------------------------------------------------------------------
# Registry status markers
# -----------------------------------------------------------------------------
status:
  draft: "🔴"
  approved: "🟡"
  in_progress: "🟡"
  completed: "✅"

# -----------------------------------------------------------------------------
# Workflow
# -----------------------------------------------------------------------------
features:
  require_implementation_approval_non_trivial: true
