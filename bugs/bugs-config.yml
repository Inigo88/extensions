# Bug registry extension configuration

# -----------------------------------------------------------------------------
# Paths
# -----------------------------------------------------------------------------
paths:
  data_dir: ".project/bugs"
  registry_filename: "bug-report.md"

# -----------------------------------------------------------------------------
# Registry status markers
# -----------------------------------------------------------------------------
status:
  open: "🔴"
  investigating: "🟡"
  fix_proposed: "🟡"
  resolved: "✅"

# -----------------------------------------------------------------------------
# Workflow
# -----------------------------------------------------------------------------
features:
  require_fix_approval_non_trivial: true
